name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.18.3"

jobs:
  go:
    name: Go quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal web/embed.go)"
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...

  web:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      # `pnpm build` runs `tsc -b` (typecheck) then vite. ESLint is intentionally not
      # gated here — the repo carries pre-existing lint debt unrelated to this work.
      - run: pnpm build
        working-directory: web

  desktop-check:
    name: Desktop build check (no bundle)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm install --frozen-lockfile
        working-directory: desktop
      # Compiles the Rust shell + runs beforeBuildCommand (UI + sidecar) but skips
      # the installer — catches desktop breakage on every PR without the full bundle cost.
      - run: pnpm tauri:build -- --no-bundle
        working-directory: desktop
