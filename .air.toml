root = "."
tmp_dir = "bin/.air"

[build]
  cmd = "go build -o ./bin/cairn ./cmd/cairn"
  bin = "./bin/cairn"
  args_bin = ["serve", "--actor", "agent:dev", "--repo", "."]
  include_ext = ["go"]
  exclude_dir = ["bin", ".cairn"]
  kill_delay = "500ms"
  stop_on_error = true

[misc]
  clean_on_exit = true
