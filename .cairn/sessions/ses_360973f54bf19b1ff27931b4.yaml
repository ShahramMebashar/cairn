summary: |-
  Status updates no longer re-read the whole board. Root cause: single-task paths called store.List() (full disk scan + whole-graph re-validation) when a status move only needs the task, its listed deps, and config — notes were fast because they skip that.

  Changes:
  - task.go: added DepResolver, ReadyFunc, CanTransitionFunc; Ready/CanTransition now wrap them.
  - service.go: Service.depResolver() (one store.Get per dep); Transition dropped store.List().
  - tools.go: ReadyOf resolves only the task's deps — also speeds note/update/get since it's on every single-task response.
  - queries.ts: useTransition is now optimistic (instant UI, rollback on error).
  - events.go: buildEvent keeps task-changed when one task + a coincident session write land in the same window (fixes the original "task page not realtime" report).

  Trade-off: removed per-transition whole-graph integrity validation; still enforced on list/read paths. Gated review/closed transitions still run command checks synchronously (intentional; not addressed). Verified: go test ./... and go vet clean, pnpm build clean, added TestReadyFuncResolvesOnlyListedDeps. Review focus: confirm dropping graph validation from the transition path is acceptable.
