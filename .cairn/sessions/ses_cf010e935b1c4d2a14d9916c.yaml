summary: |-
  Mirrored dbugd's release setup for cairn — adding the standalone-binary distribution it was missing and restructuring the desktop release into per-OS jobs.

  New:
  - .goreleaser.yaml — builds `cairn` for linux/darwin/windows × amd64/arm64 (CGO off), ldflags inject `-X main.version`, a before-hook builds the embedded web UI (pnpm) + `go mod tidy`, produces tar.gz/zip archives + checksums.txt, and attaches install.sh to the release.
  - install.sh — `curl -fsSL …/releases/latest/download/install.sh | sh`: detects OS/arch, downloads + checksum-verifies the archive, installs to BINDIR (default /usr/local/bin, sudo if needed), runs `cairn version`.
  - cmd/cairn/main.go — `var version = "dev"` + a `version`/`--version`/`-v` command (GoReleaser overrides version at build time).

  Rewrote .github/workflows/release.yml to dbugd's shape (tags v*): a GoReleaser `release` job for the Go binary, then desktop-macos / desktop-linux / desktop-windows jobs (needs: release) that pnpm-install, stamp the version, run `pnpm tauri:build -- --bundles …`, checksum, and upload installers to the same release via softprops. TAURI_SIGNING_* is passed so updater .sig artifacts are signed; Apple signing/notarization is scaffolded but guarded (runs only when APPLE_CERTIFICATE is set) so unsigned builds work today. Adapted from dbugd: pnpm not npm, desktop/ not web/ for the Tauri project. dist/ gitignored.

  Docs: installation.md gained an "Install the binary" curl|sh section (with a placeholder note until the first tag); CHANGELOG [Unreleased] updated.

  Verified locally with goreleaser v2.16.0: `goreleaser check` clean; `goreleaser build --snapshot --clean` produced all six binaries with correct architectures (PE32+ x86-64, Mach-O arm64, ELF x86-64); version injection confirmed (`cairn 0.0.0-SNAPSHOT-…`); `cairn version` works; install.sh passes `sh -n`; both YAML files parse; docs build clean. All three command checks on the task pass.

  Follow-ups (manual check still open until observed in CI):
  - The in-app updater feed (latest.json) is NOT generated by the new desktop jobs — dbugd's doesn't either. Auto-update no-ops until a feed is published; the .sig artifacts are produced, so a small aggregation step could compose latest.json later.
  - Apple notarization + Windows code signing still need repo secrets; until then installers are unsigned and warn on first launch.
  - To ship: push a tag like v0.1.0 (requires TAURI_SIGNING_PRIVATE_KEY[_PASSWORD] secrets, already referenced). GoReleaser also needs no extra secret beyond GITHUB_TOKEN.
