summary: |-
  Added Disconnect — the reverse of Connect — so users can cleanly remove cairn from an agent.

  Backend: new format.remove(existing) on every adapter strips ONLY the cairn entry and re-encodes, preserving all other servers/keys; emptied parent maps/tables are pruned so no stray `mcpServers: {}` / `[mcp_servers]` header is left. connect.Disconnect(agentID, repo): no-op when the file is absent or has no cairn entry, otherwise atomic write + <path>.bak + verify-the-entry-is-gone. New endpoint DELETE /api/connect/{agent}?path=.

  Frontend: useDisconnectAgent hook; connected auto-cards show an Unplug ghost icon-button beside Reconnect (red on hover, tooltip explains it removes cairn from that agent's config). Disconnect invalidates detection so the card flips back to its Connect state.

  Tests: TestDisconnectRemovesOnlyCairnAndKeepsSiblings, TestDisconnectMissingFileIsNoop. make check + pnpm web build green. Live-verified via cairn web: connect added cairn beside a pre-existing `other` server; DELETE removed only cairn (kept `other`), wrote .bak, and detection returned connected:false.

  Also rebuilt with the single-column card layout per user request. Standing caveats unchanged (Codex TOML cosmetic empty-table header is now avoided on remove but still emitted on connect; desktop sidecar-path embedding not yet exercised in the packaged Tauri app; Antigravity remains manual pending path confirmation).
